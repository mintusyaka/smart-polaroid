<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img"><title>Макет пристрою Smart Polaroid: перед і зад</title><desc>Зліва — вигляд спереду у формі класичного Polaroid-фото з ілюстрацією пейзажу у верхній частині та реалістичним монохромним E-Ink дисплеєм знизу, що показує текстове повідомлення та значок сповіщення про нове голосове. Справа — вигляд ззаду з отворами динаміка та слотом Type-C для заряджання</desc><defs><pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.4" fill="#00000014"/></pattern><linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fc2dd"/><stop offset="1" stop-color="#f3c98b"/></linearGradient><clipPath id="photoClip"><rect x="54" y="54" width="232" height="232" rx="6"/></clipPath></defs><rect x="46" y="46" width="260" height="380" rx="16" fill="#e3ddc9"/><rect x="40" y="40" width="260" height="380" rx="16" fill="#fbfaf6" stroke="#d9d3c2" stroke-width="1"/><g clip-path="url(#photoClip)"><rect x="54" y="54" width="232" height="232" fill="url(#skyGrad)"/><circle cx="190" cy="130" r="26" fill="#f6d17a"/><path d="M54,220 L90,170 L120,200 L150,160 L180,205 L210,175 L240,210 L286,190 L286,286 L54,286 Z" fill="#9aa88c"/><path d="M54,255 L100,225 L140,250 L190,220 L230,248 L286,230 L286,286 L54,286 Z" fill="#5f7050"/><path d="M118,88 q4,-6 8,0 q4,-6 8,0" stroke="#4a4a44" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M150,102 q4,-5 8,0 q4,-5 8,0" stroke="#4a4a44" stroke-width="1.5" fill="none" stroke-linecap="round"/></g><rect x="54" y="54" width="232" height="232" rx="6" fill="none" stroke="#e6e2d5" stroke-width="1"/><path d="M54 54 L180 54 L54 180 Z" fill="#ffffff" opacity="0.18"/><rect x="52" y="284" width="236" height="124" rx="7" fill="#c9c6bb"/><rect x="54" y="286" width="232" height="120" rx="6" fill="#dad7cc"/><rect x="54" y="286" width="232" height="120" rx="6" fill="url(#grain)"/><rect x="54" y="286" wid